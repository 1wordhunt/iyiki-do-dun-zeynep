<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Zeynep!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0c29;
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            display: flex;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            min-height: 60px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }

        #yes-btn {
            background: linear-gradient(45deg, #00d4ff, #00ff87);
            color: #000;
        }

        #no-btn {
            background: #ff4b2b;
            color: white;
            position: absolute;
        }

        #troll-text {
            display: none;
            margin-top: 25px;
            color: #ffde59;
            font-weight: bold;
            animation: shake 0.5s infinite;
        }

        .celebration-title {
            font-size: 2.2rem;
            background: linear-gradient(45deg, #ff00ea, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .dynamic-text {
            font-size: 1.6rem;
            color: #fff;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="question-screen" class="container">
        <div class="glass-card">
            <h1 id="question-text">İyi ki doğdun! 🎂<br>Bu hediyeyi kabul ediyor musun?</h1>
            <div class="button-group">
                <button id="yes-btn" onclick="acceptGift()">Evet</button>
                <button id="no-btn" onmouseover="moveButton()" onclick="moveButton()">Hayır</button>
            </div>
            <p id="troll-text">Şimdi başka görelim! 😎</p>
        </div>
    </div>

    <div id="celebration-screen" class="container" style="display: none;">
        <div class="glass-card">
            <h1 class="celebration-title">Kabul edeceğini biliyordum! ❤️</h1>
            <div class="message-box">
                <h2 class="dynamic-text">İyi ki doğdun Zeynep, iyi ki varsın! 🥳</h2>
            </div>
        </div>
    </div>

    <script>
        // Hayır butonunu kaçıran fonksiyon
        function moveButton() {
            const noBtn = document.getElementById('no-btn');
            const trollText = document.getElementById('troll-text');
            
            // Ekran sınırlarını belirle (butonun dışarı taşmaması için)
            const padding = 50;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding);
            
            noBtn.style.position = "fixed";
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
            
            // "Şimdi başka görelim" yazısını göster
            trollText.style.display = "block";
        }

        // Evet butonuna basınca olacaklar
        function acceptGift() {
            document.getElementById('question-screen').style.display = "none";
            document.getElementById('celebration-screen').style.display = "flex";
            
            // Konfeti efektini başlat
            launchConfetti();
        }

        function launchConfetti() {
            var duration = 15 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } 
                }));
            }, 250);
        }
    </script>
</body>
</html>
