<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İyi Ki Doğdun Zeynep! 🥳</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem 1.5rem;
            border-radius: 35px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 88%;
            text-align: center; /* İÇERİĞİ ORTALAR */
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center; /* İÇERİĞİ DİKEYDE ORTALAR */
            justify-content: center; /* İÇERİĞİ YATAYDA ORTALAR */
        }

        /* GIF'i ortalamak ve boyutu korumak */
        .gif-display {
            width: 160px;
            height: 160px;
            margin-bottom: 20px;
            border-radius: 20px;
            display: block;
            object-fit: contain;
            /* Flex ile ortalamaya gerek yok, parent'tan ortalanıyor */
        }
        
        /* Başlıkları ortalamak */
        h1 {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            line-height: 1.3;
            width: 100%;
            text-align: center;
        }

        /* Butonları ortalamak ve simetrik yapmak */
        .button-group {
            display: flex;
            justify-content: center; /* YATAYDA ORTALAR */
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 60px;
            width: 100%;
        }

        button {
            padding: 12px 28px;
            font-size: 1.05rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 110px; /* Buton genişliklerini eşitlemek için */
        }

        #yes-btn {
            background: linear-gradient(45deg, #00d4ff, #00ff87);
            color: #000;
        }

        #no-btn {
            background: #ff4b2b;
            color: white;
            position: relative;
        }

        /* Dilek Bölümü Tasarımı - TAM ORTALANMIŞ */
        .wish-section {
            margin-top: 25px;
            width: 100%;
            display: none; /* İlk aşamada gizli */
            animation: fadeIn 1s forwards;
            flex-direction: column;
            align-items: center; /* İÇERİĞİ ORTALAR */
        }

        .personal-msg {
            font-size: 1.05rem;
            margin-bottom: 10px;
            text-align: center;
            line-height: 1.4;
        }

        textarea {
            width: 100%;
            padding: 14px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: inherit;
            resize: none;
            margin: 15px 0;
            outline: none;
            transition: 0.3s;
            text-align: left; /* Yazı soldan başlasın */
        }

        textarea:focus {
            border-color: rgba(0, 212, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        /* Gönder butonunu ortalamak */
        .send-btn {
            background: #ffde59;
            color: #000;
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 222, 89, 0.3);
            margin-top: 10px;
        }
        
        #status-msg {
            font-size: 0.9rem;
            color: #00ff87;
            display: none;
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }

        .footer-note {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 8px;
            font-style: italic;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="question-screen">
        <div class="glass-card">
            <img id="main-gif" class="gif-display" src="https://i.ibb.co/5hFyFJ9v/Dudu-Cute-Sticker-Dudu-Cute-Smile-Descubre-y-comparte-G-F.gif" alt="Gizemli Sürpriz">
            
            <h1 id="header-text">İyi ki doğdun! 🎂<br>Bu küçük sürprizi kabul eder misin?</h1>
            
            <div class="button-group">
                <button id="yes-btn" onclick="acceptGift()">Evet!</button>
                <button id="no-btn" onmouseover="moveButton()" ontouchstart="moveButton()">Hayır</button>
            </div>
        </div>
    </div>

    <div id="celebration-screen" style="display: none;">
        <div class="glass-card">
            <img class="gif-display" src="https://i.ibb.co/9mttxWVJ/a4e25709-0c40-4394-bb89-28c8cfe3c3d7.gif" alt="Kutlama Zamanı">
            
            <h1 class="celebration-title" style="font-size: 1.8rem; background: linear-gradient(45deg, #ff00ea, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.8rem;">İyi ki doğdun Zeynep! 🎉</h1>
            
            <div class="wish-section" id="wish-area" style="display: flex;">
                <p class="personal-msg">Yeni yaşın sana tüm güzellikleri getirsin.</p>
                <p style="color: #ffde59; font-weight: bold; font-size: 1.1rem; margin-top: 10px;">✨ Bir dilek tut...</p>
                <p class="footer-note">Bu dilek sadece bu anın içinde saklı kalacak.</p>
                
                <form id="wish-form" action="https://formspree.io/f/mbdzkdpr" method="POST" style="width: 100%;">
                    <textarea name="Zeynep_Dilegi" rows="3" placeholder="Kalbinden geçen o dileği buraya yaz..." required></textarea>
                    <button type="submit" class="send-btn" id="submit-btn">Yıldızlara Gönder 🌠</button>
                </form>
                
                <p id="status-msg">Dileğin evrene gönderildi! ✨</p>
            </div>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('no-btn');
            const mainGif = document.getElementById('main-gif');
            
            // image_2.png (Sinirli Kedi)
            mainGif.src = "https://i.ibb.co/TMqM7wgh/Cute-Gif-G-F-Cute-Gif-Angry-Cat-discover-and-share-G-Fs.gif";
            
            noBtn.style.position = "fixed";
            const p = 80;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - p) + p/2;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - p) + p/2;
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }

        function acceptGift() {
            document.getElementById('question-screen').style.display = "none";
            document.getElementById('celebration-screen').style.display = "flex"; /* Flex ile ortalamayı korur */
            
            // Konfeti fırtınası
            var end = Date.now() + (10 * 1000);
            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 65,
                    origin: { x: 0 },
                    colors: ['#00d4ff', '#ff00ea', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 65,
                    origin: { x: 1 },
                    colors: ['#00d4ff', '#ff00ea', '#ffffff']
                });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        // Formspree ile sessizce mail gönderme (Seni ele vermeyen mekanizma)
        const form = document.getElementById("wish-form");
        form.addEventListener("submit", async function(e) {
            e.preventDefault();
            const btn = document.getElementById("submit-btn");
            const status = document.getElementById("status-msg");
            btn.innerText = "Gönderiliyor...";
            btn.disabled = true; // Tekrar basılmasını engeller
            
            const data = new FormData(e.target);
            fetch(e.target.action, {
                method: 'POST',
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    status.style.display = "block";
                    form.style.display = "none";
                    // Dilek gittiğinde ek bir konfeti patlat (final dokunuş)
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                } else {
                    btn.innerText = "Yıldızlara Gönder 🌠";
                    btn.disabled = false;
                    alert("Bir sorun oluştu. Lütfen tekrar dene.");
                }
            });
        });
    </script>
</body>
</html>
