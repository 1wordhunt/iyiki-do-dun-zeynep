<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İyi Ki Doğdun Zeynep!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem 1.5rem;
            border-radius: 35px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            width: 88%;
            max-width: 360px;
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        .gif-display {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            border-radius: 20px;
            object-fit: contain;
        }

        h1 {
            color: white;
            font-size: 1.35rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
            width: 100%;
            min-height: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        button {
            height: 55px; /* Biraz daha yüksek */
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yes-btn {
            flex: 1;
            background: linear-gradient(45deg, #00d4ff, #00ff87);
            color: #000;
        }

        #no-btn {
            flex: 1.2; /* Hayır butonu biraz daha büyük durması için */
            background: #ff4b2b;
            color: white;
            position: relative;
            z-index: 999;
        }

        .wish-section {
            width: 100%;
            margin-top: 15px;
            display: none;
            animation: fadeIn 0.8s forwards;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: inherit;
            resize: none;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }

        .send-btn {
            background: #ffde59;
            color: #000;
            width: 100% !important;
        }

        #status-msg { font-size: 0.85rem; color: #00ff87; display: none; margin-top: 10px; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="success-sound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="move-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <div id="question-screen">
        <div class="glass-card">
            <img id="main-gif" class="gif-display" src="https://i.ibb.co/5hFyFJ9v/Dudu-Cute-Sticker-Dudu-Cute-Smile-Descubre-y-comparte-G-F.gif">
            <h1 id="header-text">İyi ki doğdun! 🎂<br>Bu küçük sürprizi kabul eder misin?</h1>
            <div class="button-group">
                <button id="yes-btn" onclick="acceptGift()">Evet!</button>
                <button id="no-btn" onmouseover="moveButton()" ontouchstart="moveButton()">Hayır</button>
            </div>
        </div>
    </div>

    <div id="celebration-screen" style="display: none;">
        <div class="glass-card">
            <img class="gif-display" src="https://i.ibb.co/9mttxWVJ/a4e25709-0c40-4394-bb89-28c8cfe3c3d7.gif">
            <h1 style="min-height: auto; margin-bottom: 10px;">İyi ki doğdun Zeynep! 🎉</h1>
            <div class="wish-section" id="wish-area">
                <p style="color:white; margin-bottom:15px;">Yeni yaşın sana tüm güzellikleri getirsin.</p>
                <form id="wish-form" action="https://formspree.io/f/mbdzkdpr" method="POST">
                    <textarea name="Zeynep_Dilegi" rows="3" placeholder="Bir dilek tut ve buraya yaz..." required></textarea>
                    <button type="submit" class="send-btn" id="submit-btn">Yıldızlara Gönder 🌠</button>
                </form>
                <p id="status-msg">Dileğin evrene gönderildi! ✨</p>
            </div>
        </div>
    </div>

    <script>
        const moveSound = document.getElementById('move-sound');
        const successSound = document.getElementById('success-sound');

        function moveButton() {
            const noBtn = document.getElementById('no-btn');
            const mainGif = document.getElementById('main-gif');
            const headerText = document.getElementById('header-text');

            // Ses çal (Kaçarken)
            moveSound.currentTime = 0;
            moveSound.play().catch(e => console.log("Ses çalma engellendi"));

            headerText.innerHTML = "direk şimdi basta gorelim yazsin";
            mainGif.src = "https://i.ibb.co/TMqM7wgh/Cute-Gif-G-F-Cute-Gif-Angry-Cat-discover-and-share-G-Fs.gif";
            
            noBtn.style.position = "fixed";
            const p = 100;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - p) + p/2;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - p) + p/2;
            
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }

        function acceptGift() {
            // Ses çal (Evet deyince)
            successSound.play();

            document.getElementById('question-screen').style.display = "none";
            document.getElementById('celebration-screen').style.display = "flex";
            document.getElementById('wish-area').style.display = "block";
            
            var end = Date.now() + (7 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        const form = document.getElementById("wish-form");
        form.addEventListener("submit", async function(e) {
            e.preventDefault();
            const btn = document.getElementById("submit-btn");
            const status = document.getElementById("status-msg");
            btn.innerText = "Gönderiliyor...";
            
            fetch(e.target.action, {
                method: 'POST',
                body: new FormData(e.target),
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    status.style.display = "block";
                    form.style.display = "none";
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            });
        });
    </script>
</body>
</html>
