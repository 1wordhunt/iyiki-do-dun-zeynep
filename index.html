<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İyi Ki Doğdun Zeynep!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem 1.5rem;
            border-radius: 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
            text-align: center;
            z-index: 100;
        }

        .gif-display {
            width: 180px;
            height: 180px;
            margin: 0 auto 15px;
            border-radius: 20px;
            display: block;
            object-fit: contain;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; line-height: 1.3; }

        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 60px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        #yes-btn { background: linear-gradient(45deg, #00d4ff, #00ff87); color: #000; }
        #no-btn { background: #ff4b2b; color: white; position: relative; z-index: 1000; }

        .celebration-title {
            font-size: 1.8rem;
            background: linear-gradient(45deg, #ff00ea, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        #troll-text {
            color: #ffde59;
            margin-top: 15px;
            font-weight: bold;
            display: none;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="question-screen">
        <div class="glass-card">
            <img id="main-gif" class="gif-display" src="https://i.ibb.co/5hFyFJ9v/Dudu-Cute-Sticker-Dudu-Cute-Smile-Descubre-y-comparte-G-F.gif" alt="Giriş GIF">
            
            <h1 id="header-text">İyi ki doğdun! 🎂<br>Bu hediyeyi kabul ediyor musun?</h1>
            
            <div class="button-group">
                <button id="yes-btn" onclick="acceptGift()">Evet</button>
                <button id="no-btn" onmouseover="moveButton()" ontouchstart="moveButton()">Hayır</button>
            </div>
            <p id="troll-text">Şimdi başka görelim! 😎</p>
        </div>
    </div>

    <div id="celebration-screen" style="display: none;">
        <div class="glass-card">
            <img class="gif-display" src="https://i.ibb.co/9mttxWVJ/a4e25709-0c40-4394-bb89-28c8cfe3c3d7.gif" alt="Kutlama GIF">
            
            <h1 class="celebration-title">Kabul edeceğini biliyordum! ❤️</h1>
            <h2>İyi ki doğdun Zeynep, iyi ki varsın! 🥳</h2>
            <p style="margin-top: 15px; font-size: 0.9rem; opacity: 0.8;">Her günün böyle mutlu geçsin!</p>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('no-btn');
            const mainGif = document.getElementById('main-gif');
            const trollText = document.getElementById('troll-text');

            // GIF'i sinirli kediyle değiştir
            mainGif.src = "https://i.ibb.co/TMqM7wgh/Cute-Gif-G-F-Cute-Gif-Angry-Cat-discover-and-share-G-Fs.gif";
            
            // "Şimdi başka görelim" yazısını çıkar
            trollText.style.display = "block";

            // Butonu rastgele konuma ışınla
            noBtn.style.position = "fixed";
            const padding = 80;
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding) + (padding/2);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding) + (padding/2);
            
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }

        function acceptGift() {
            document.getElementById('question-screen').style.display = "none";
            document.getElementById('celebration-screen').style.display = "block";
            
            // Konfeti fırtınası
            var duration = 15 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff00ea', '#00d4ff', '#ffffff']
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff00ea', '#00d4ff', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
