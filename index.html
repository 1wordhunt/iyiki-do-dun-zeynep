<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Zeynep!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem 1.5rem;
            border-radius: 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 85%;
        }

        h1 { font-size: 1.6rem; margin-bottom: 2rem; }

        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 80px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            z-index: 20;
        }

        #yes-btn {
            background: linear-gradient(45deg, #00d4ff, #00ff87);
            color: #000;
        }

        #no-btn {
            background: #ff4b2b;
            color: white;
            /* İlk başta normal duracak, tetiklenince position değişecek */
        }

        #troll-text {
            display: none;
            margin-top: 20px;
            color: #ffde59;
            font-size: 0.9rem;
        }

        .celebration-title {
            font-size: 1.8rem;
            background: linear-gradient(45deg, #ff00ea, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div id="question-screen" class="container">
        <div class="glass-card">
            <h1>İyi ki doğdun! 🎂<br>Bu hediyeyi kabul ediyor musun?</h1>
            <div class="button-group">
                <button id="yes-btn" onclick="acceptGift()">Evet</button>
                <button id="no-btn" onmouseover="moveButton()" onclick="moveButton()" ontouchstart="moveButton()">Hayır</button>
            </div>
            <p id="troll-text">Şimdi başka görelim! 😎</p>
        </div>
    </div>

    <div id="celebration-screen" class="container" style="display: none;">
        <div class="glass-card">
            <h1 class="celebration-title">Kabul edeceğini biliyordum! ❤️</h1>
            <h2>İyi ki doğdun Zeynep, iyi ki varsın! 🥳</h2>
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('no-btn');
            const trollText = document.getElementById('troll-text');
            
            // Mobilde kaçması için position'ı fixed yapıyoruz
            noBtn.style.position = "fixed";
            
            // Ekran boyutlarına göre rastgele konum (butonun taşmaması için pay bırakıldı)
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;
            
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
            
            trollText.style.display = "block";
        }

        function acceptGift() {
            document.getElementById('question-screen').style.display = "none";
            document.getElementById('celebration-screen').style.display = "flex";
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });

            // Sürekli konfeti yağmuru
            var end = Date.now() + (10 * 1000);
            (function frame() {
                confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }
    </script>
</body>
</html>
